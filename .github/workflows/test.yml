# Runs the full test suite on every push and PR.
#
# Spins up an ephemeral Postgres 18 service container, points DATABASE_URL at
# it, then runs `npm run test:ci`. seed-test-db.ts applies the schema
# migration on a fresh DB before inserting fixtures, so CI is self-contained.

name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracker_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Builds the Next.js production bundle first so `next dev` doesn't
      # spend the test-with-server timeout on a cold compile.
      - run: npm run build

      - run: npm run test:ci
